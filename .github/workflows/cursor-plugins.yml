name: Agent plugins

on:
  pull_request:
    paths:
      - '.cursor/**'
      - 'packages/agent-plugin/**'
      - 'docs/agents/**'
      - 'AGENTS.md'
      - '.cursor-plugin/**'
      - '.github/workflows/cursor-plugins.yml'
      - '.github/scripts/validate-agent-plugins.mjs'
      - '.github/scripts/validate-agent-plugins-helpers.mjs'
      - '.github/scripts/validate-agent-plugins-helpers.test.mjs'
  push:
    branches:
      - main
    paths:
      - '.cursor/**'
      - 'packages/agent-plugin/**'
      - 'docs/agents/**'
      - 'AGENTS.md'
      - '.cursor-plugin/**'
      - '.github/workflows/cursor-plugins.yml'
      - '.github/scripts/validate-agent-plugins.mjs'
      - '.github/scripts/validate-agent-plugins-helpers.mjs'
      - '.github/scripts/validate-agent-plugins-helpers.test.mjs'
  workflow_dispatch:

concurrency:
  group: cursor-plugins-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version-file: '.nvmrc'
      - name: Test agent plugin validator helpers
        run: node --test .github/scripts/validate-agent-plugins-helpers.test.mjs
      - name: Validate agent plugins (marketplace, .cursor, dual manifests)
        run: node .github/scripts/validate-agent-plugins.mjs
      - name: Validate plugin semver bumps vs PR base
        if: github.event_name == 'pull_request'
        env:
          CURSOR_PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          CURSOR_PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: node .github/scripts/validate-agent-plugins.mjs --pr-version-bumps
